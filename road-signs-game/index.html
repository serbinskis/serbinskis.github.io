<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Signs Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2L2 22h20L12 2z'/><circle cx='12' cy='16' r='1' fill='%233b82f6'/><line x1='12' y1='8' x2='12' y2='13'/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/home/js/navigation.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        let isDarkMode = localStorage.theme === 'light' ? false : true;
        localStorage.theme = isDarkMode ? 'dark' : 'light';
        document.documentElement.classList.toggle('dark', isDarkMode);
    </script>

    <style>
        /* Custom Scrollbars */
        .dark ::-webkit-scrollbar { width: 10px; }
        .dark ::-webkit-scrollbar-track { background: #1f2937; border-radius: 5px;}
        .dark ::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 5px; border: 2px solid #1f2937; }
        .dark ::-webkit-scrollbar-thumb:hover { background-color: #6b7280; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast { animation: slideDown 0.3s ease-out forwards; pointer-events: auto; }
        
        /* Smooth selection ring transitions */
        .sign-option { transition: all 0.2s ease-in-out; }

        /* Hide Number Input Spinners (Up/Down Arrows) */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { 
            -moz-appearance: textfield;
            appearance: textfield; 
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300 font-sans flex flex-col h-[100dvh] text-gray-800 dark:text-gray-200 overflow-x-hidden">
    
    <!-- Toast Container for alerts -->
    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-md px-4 pointer-events-none"></div>

    <!-- Header -->
    <header class="select-none flex-shrink-0 bg-white dark:bg-gray-800 shadow-sm transition-colors duration-300">
        <div class="container mx-auto max-w-5xl px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2L2 22h20L12 2z" />
                    <circle cx="12" cy="16" r="1" fill="currentColor"/>
                    <line x1="12" y1="8" x2="12" y2="13"/>
                </svg>
                Road Signs Quiz
            </h1>
            <button id="theme-toggle" class="p-2 rounded-full text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                <svg id="theme-icon-light" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                <svg id="theme-icon-dark" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            </button>
        </div>
    </header>

    <main class="container mx-auto max-w-5xl p-4 flex-grow flex flex-col gap-4 overflow-y-auto">
        
        <!-- Main Quiz Card -->
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md flex flex-col gap-5 text-center transition-colors">
            
            <!-- Quiz Info Text -->
            <div>
                <h2 id="text" class="text-3xl font-bold text-gray-900 dark:text-white mb-2 select-text">Loading...</h2>
                <span id="type" class="inline-block bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200 text-sm px-3 py-1 rounded-full font-semibold mb-3 tracking-wide">Category</span>
                <p id="description" class="text-gray-600 dark:text-gray-400 max-w-2xl mx-auto select-text min-h-[48px]">Sign description will appear here.</p>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-2 font-mono">Sign ID: <span id="current">0</span></p>
            </div>

            <!-- Dynamic Image Selection Grid -->
            <div id="image-grid" class="flex flex-wrap justify-center gap-4 bg-gray-50 dark:bg-gray-900/50 p-4 rounded-xl border border-gray-100 dark:border-gray-700 min-h-[120px]">
                <!-- Options injected by JS -->
            </div>

            <!-- Result Message -->
            <div class="h-6 mt-1 mb-1">
                <p id="result-message" class="text-lg font-bold transition-opacity duration-300 opacity-0 pointer-events-none"></p>
            </div>

            <!-- Navigation Controls -->
            <div class="flex flex-wrap justify-center items-center gap-3">
                <button id="previous" class="px-5 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-300 dark:border-gray-600 rounded-lg font-medium transition-colors">Previous</button>
                <button id="random" class="px-5 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-300 dark:border-gray-600 rounded-lg font-medium transition-colors">Random</button>
                <button id="next" class="px-5 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-300 dark:border-gray-600 rounded-lg font-medium transition-colors">Next</button>
            </div>
        </div>

        <!-- Settings / Options Card -->
        <div class="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-md flex flex-col md:flex-row gap-6 transition-colors">
            
            <!-- Number of Choices -->
            <div class="flex-1 flex flex-col gap-2">
                <label class="text-sm font-bold text-gray-600 dark:text-gray-300">Amount of Choices</label>
                <div class="flex gap-2">
                    <input type="number" id="amount" placeholder="10" min="2" max="50" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <button id="amount-button" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 font-medium rounded-lg transition-colors">Apply</button>
                </div>
            </div>

            <!-- Custom Sign Selection -->
            <div class="flex-1 flex flex-col gap-2">
                <label class="text-sm font-bold text-gray-600 dark:text-gray-300">Custom Sign Pool (IDs)</label>
                <div class="flex gap-2">
                    <input type="text" id="selected" placeholder="e.g. [1, 2, 3]" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm">
                    <button id="select" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 font-medium rounded-lg transition-colors">Apply</button>
                </div>
            </div>

        </div>
    </main>

    <script src="js/signs.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
